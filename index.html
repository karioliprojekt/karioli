<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karioli – App-Architekturen und Animationen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #1a2b2e;
    color: #f5f0e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .logo-img {
    width: 180px;
    height: auto;
    margin-bottom: 1.2rem;
  }

  h1 {
    font-size: 2.4rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #E8A020;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .tagline {
    font-size: 0.95rem;
    font-weight: 300;
    color: #a0b8bc;
    letter-spacing: 0.08em;
    margin-bottom: 3rem;
    text-align: center;
  }

  .header-row {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    margin-bottom: 0.4rem;
  }

  .header-info-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(232, 160, 32, 0.35);
    background: rgba(232, 160, 32, 0.08);
    text-decoration: none;
    transition: background 0.2s ease, transform 0.2s ease;
    flex-shrink: 0;
  }
  .header-info-btn:hover {
    background: rgba(232, 160, 32, 0.22);
    transform: scale(1.06);
  }
  .header-info-btn svg { width: 16px; height: 16px; }

  .apps {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    max-width: 380px;
  }

  .app-btn {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    padding: 1.1rem 1.6rem;
    border-radius: 12px;
    text-decoration: none;
    transition: transform 0.2s ease, background 0.2s ease;
    border: 1px solid rgba(232, 160, 32, 0.25);
  }

  .app-btn:hover {
    transform: translateX(6px);
  }

  .app-row {
    display: flex;
    align-items: stretch;
    gap: 0.6rem;
  }
  .app-row .app-btn { flex: 1; min-width: 0; }

  .info-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    width: 48px;
    border-radius: 12px;
    border: 1px solid rgba(232, 160, 32, 0.25);
    background: rgba(232, 160, 32, 0.08);
    text-decoration: none;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .info-btn:hover {
    background: rgba(232, 160, 32, 0.22);
    transform: translateY(-2px);
  }
  .info-btn svg { width: 18px; height: 18px; }
  .info-btn.rot { border-color: rgba(180, 60, 60, 0.3); background: rgba(180, 60, 60, 0.1); }
  .info-btn.rot:hover { background: rgba(180, 60, 60, 0.22); }
  .info-btn.gruen { border-color: rgba(60, 140, 100, 0.3); background: rgba(60, 140, 100, 0.1); }
  .info-btn.gruen:hover { background: rgba(60, 140, 100, 0.22); }

  .app-btn.gelb { background: rgba(232, 160, 32, 0.12); }
  .app-btn.gelb:hover { background: rgba(232, 160, 32, 0.22); }

  .app-btn.rot { background: rgba(180, 60, 60, 0.12); }
  .app-btn.rot:hover { background: rgba(180, 60, 60, 0.22); }
  .app-btn.rot { border-color: rgba(180, 60, 60, 0.3); }

  .app-btn.gruen { background: rgba(60, 140, 100, 0.12); }
  .app-btn.gruen:hover { background: rgba(60, 140, 100, 0.22); }
  .app-btn.gruen { border-color: rgba(60, 140, 100, 0.3); }

  .app-ring {
    width: 22px;
    height: auto;
    flex-shrink: 0;
    opacity: 0.95;
  }

  .btn-text { flex: 1; }
  .btn-name {
    font-size: 1.05rem;
    font-weight: 600;
    color: #f5f0e8;
    letter-spacing: 0.03em;
  }
  .btn-sub {
    font-size: 0.78rem;
    color: #7a9ea4;
    font-weight: 300;
    margin-top: 2px;
  }

  .arrow {
    color: #E8A020;
    opacity: 0.6;
    font-size: 1.1rem;
  }

  footer {
    margin-top: 3rem;
    font-size: 0.72rem;
    color: #3d5558;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<img src="karioli-logo.png" alt="Karioli Logo" class="logo-img">
<div class="header-row">
  <h1>Karioli</h1>
  <a href="karioli-intro.html" class="header-info-btn" target="_blank" rel="noopener" title="Über Karioli" aria-label="Über Karioli">
    <svg viewBox="0 0 24 24" fill="none" stroke="#E8A020" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="9.5"/>
      <line x1="12" y1="11" x2="12" y2="16.5"/>
      <circle cx="12" cy="7.5" r="0.6" fill="#E8A020"/>
    </svg>
  </a>
</div>
<p class="tagline">App-Architekturen und Animationen</p>

<div class="apps">

  <div class="app-row">
    <a href="https://karioliprojekt.github.io/karioli/karipharm.html" class="app-btn gelb" target="_blank" rel="noopener">
      <img src="karioli-ring-gold.png" class="app-ring" alt="">
      <div class="btn-text">
        <div class="btn-name">kariPharm</div>
        <div class="btn-sub">Autonomie und Selbstmanagement · Projekt Gelb</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="https://karioliprojekt.github.io/karioli/karioli-karipharm.html" class="info-btn" target="_blank" rel="noopener" title="Info-Mappe lesen" aria-label="kariPharm Info-Mappe lesen">
      <svg viewBox="0 0 24 24" fill="none" stroke="#E8A020" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="9.5"/>
        <line x1="12" y1="11" x2="12" y2="16.5"/>
        <circle cx="12" cy="7.5" r="0.6" fill="#E8A020"/>
      </svg>
    </a>
  </div>

  <div class="app-row">
    <a href="https://karioliprojekt.github.io/karioli/karinurse.html" class="app-btn rot" target="_blank" rel="noopener">
      <img src="karioli-ring-red.png" class="app-ring" alt="">
      <div class="btn-text">
        <div class="btn-name">kariNurse</div>
        <div class="btn-sub">Sprachbarrieren in der Pflegeausbildung · Projekt Rot</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="https://karioliprojekt.github.io/karioli/karioli-karinurse.html" class="info-btn rot" target="_blank" rel="noopener" title="Info-Mappe lesen" aria-label="kariNurse Info-Mappe lesen">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c45050" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="9.5"/>
        <line x1="12" y1="11" x2="12" y2="16.5"/>
        <circle cx="12" cy="7.5" r="0.6" fill="#c45050"/>
      </svg>
    </a>
  </div>

  <div class="app-row">
    <a href="https://karioliprojekt.github.io/karioli/karicare.html" class="app-btn gruen" target="_blank" rel="noopener">
      <img src="karioli-ring-green.png" class="app-ring" alt="">
      <div class="btn-text">
        <div class="btn-name">kariCare</div>
        <div class="btn-sub">Katastrophenmanagement · Projekt Grün</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="https://karioliprojekt.github.io/karioli/karioli-karicare.html" class="info-btn gruen" target="_blank" rel="noopener" title="Info-Mappe lesen" aria-label="kariCare Info-Mappe lesen">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3c8c64" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="9.5"/>
        <line x1="12" y1="11" x2="12" y2="16.5"/>
        <circle cx="12" cy="7.5" r="0.6" fill="#3c8c64"/>
      </svg>
    </a>
  </div>

</div>

<footer>karioli.eu &nbsp;·&nbsp; Gartow, Deutschland &nbsp;·&nbsp; 2026</footer>

</body>
</html>
